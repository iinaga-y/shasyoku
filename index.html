<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朱入れ — 写植指定ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root{
    --ink:#1b1c1e;          /* 墨 */
    --desk:#eceae4;         /* 生成りのデスク */
    --paper:#ffffff;
    --shu:#c73e1d;          /* 朱(UIアクセント) */
    --aka:#d4380d;          /* 赤字そのもの */
    --graphite:#3a3b3d;
    --line:#d8d5cd;
    --rail:#232427;
    --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
    --min:"Hiragino Mincho ProN","Yu Mincho","MS Mincho",serif;
    --mono:"SF Mono","Consolas",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:var(--sans);background:var(--desk);color:var(--graphite);overflow:hidden;font-size:13px;display:flex;flex-direction:column}

  /* ---------- 上部バー ---------- */
  #topbar{height:52px;flex-shrink:0;background:var(--ink);color:#e8e6e0;display:flex;align-items:center;gap:10px;padding:0 14px;flex-wrap:nowrap}
  #topbar .brand{font-family:var(--min);font-size:19px;letter-spacing:.35em;color:#f0ede6;margin-right:2px;white-space:nowrap}
  #topbar .brand b{color:var(--shu);font-weight:600}
  #topbar .sub{font-size:10px;color:#8f8d86;letter-spacing:.12em;margin-right:8px;white-space:nowrap}
  .tbgroup{display:flex;gap:4px;align-items:center;border-left:1px solid #3c3d40;padding-left:10px}
  button{font-family:var(--sans);cursor:pointer;border:none;border-radius:4px;font-size:12px}
  .tbtn{background:#2e2f33;color:#d8d6cf;padding:7px 11px;transition:background .12s}
  .tbtn:hover{background:#3a3b3f}
  .tbtn.active{background:var(--shu);color:#fff}
  .tbtn:focus-visible,.stamp:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  #fileName{font-size:11px;color:#a5a39c;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .spacer{flex:1}
  #zoomLabel{font-family:var(--mono);font-size:11px;color:#a5a39c;min-width:42px;text-align:center}
  #zoomWrap{display:inline-flex;align-items:center;background:#2e2f33;border-radius:4px;padding:0 6px;height:30px}
  #zoomInput{width:38px;background:none;border:none;color:#e8e6e0;font-family:var(--mono);font-size:12px;text-align:right;padding:0}
  #zoomInput:focus{outline:none;color:#fff}
  #zoomPct{color:#a5a39c;font-family:var(--mono);font-size:11px;margin-left:1px}

  /* ---------- 本体3カラム ---------- */
  #main{display:flex;flex:1;min-height:0}

  /* サムネイル */
  #thumbs{width:118px;background:var(--rail);overflow-y:auto;padding:10px 8px;flex-shrink:0}
  .thumb{position:relative;margin-bottom:10px;cursor:pointer;border:2px solid transparent;border-radius:3px;overflow:hidden}
  .thumb.current{border-color:var(--shu)}
  .thumb canvas{display:block;width:100%}
  .thumb .pnum{position:absolute;bottom:0;right:0;background:rgba(27,28,30,.8);color:#d8d6cf;font-family:var(--mono);font-size:10px;padding:1px 5px}
  .thumb .hasanno{position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;background:var(--aka)}

  /* 中央キャンバス */
  #viewerWrap{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:26px}
  #pageBox{position:relative;box-shadow:0 3px 18px rgba(27,28,30,.22);background:#fff;display:none}
  #pageCanvas{display:block}
  #annoLayer{position:absolute;inset:0;overflow:hidden;touch-action:none}
  #annoLayer.tool-text,#annoLayer.tool-stamp,#annoLayer.tool-line,#annoLayer.tool-circle,#annoLayer.tool-range,#annoLayer.tool-box{cursor:crosshair}
  #annoLayer.tool-erase{cursor:cell}
  #penSvg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  #penSvg path,#penSvg ellipse{stroke:var(--aka);fill:none;stroke-linecap:round;stroke-linejoin:round}

  .anno{position:absolute;color:var(--aka);font-weight:700;line-height:1.25;white-space:pre;user-select:none;padding:1px 3px;border:1.5px dashed transparent;border-radius:2px;min-width:8px;min-height:8px}
  .anno.vertical{writing-mode:vertical-rl;text-orientation:upright}
  .anno.selected{border-color:var(--shu);background:rgba(199,62,29,.06)}
  .anno[contenteditable="true"]{user-select:text;cursor:text;border-color:var(--shu);background:#fff;white-space:pre-wrap}
  #annoLayer.tool-select .anno{cursor:move}
  .anno.boxed{border:1.5px solid var(--aka);padding:3px 4px}
  .anno.boxed.selected{border-style:dashed;border-color:var(--shu)}
  .anno.range{padding:0;min-width:0;min-height:0;border:none;border-radius:0}
  .anno.range::before,.anno.range::after{content:"";position:absolute;background:var(--aka)}
  .anno.range.v{background:linear-gradient(to right,transparent calc(50% - 1.25px),var(--aka) calc(50% - 1.25px),var(--aka) calc(50% + 1.25px),transparent calc(50% + 1.25px))}
  .anno.range.v::before{top:0;left:0;width:100%;height:2.5px}
  .anno.range.v::after{bottom:0;left:0;width:100%;height:2.5px}
  .anno.range.h{background:linear-gradient(to bottom,transparent calc(50% - 1.25px),var(--aka) calc(50% - 1.25px),var(--aka) calc(50% + 1.25px),transparent calc(50% + 1.25px))}
  .anno.range.h::before{left:0;top:0;width:2.5px;height:100%}
  .anno.range.h::after{right:0;top:0;width:2.5px;height:100%}
  .anno.range.selected{outline:1.5px dashed var(--shu);outline-offset:3px}

  /* 選択中フローティングツール */
  #annoTools{position:absolute;display:none;gap:3px;background:var(--ink);border-radius:5px;padding:4px;z-index:30;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  #annoTools button{background:#2e2f33;color:#d8d6cf;padding:4px 8px;font-size:11px}
  #annoTools button:hover{background:var(--shu);color:#fff}

  /* スタンプパレット */
  #palette{width:252px;background:var(--paper);border-left:1px solid var(--line);overflow-y:auto;padding:0 12px 12px;flex-shrink:0}
  #palTabsWrap{position:sticky;top:0;z-index:5;background:var(--paper);padding:12px 0 10px;box-shadow:0 4px 8px -6px rgba(27,28,30,.25)}
  #palTabs{display:flex;border:1.5px solid var(--shu);border-radius:4px;overflow:hidden}
  #palTabs button{flex:1;background:#fff;color:var(--shu);padding:7px 0;font-family:var(--min);font-size:12px;letter-spacing:.15em;border-radius:0}
  #palTabs button.on{background:var(--shu);color:#fff}
  #dictSearch{width:100%;border:1px solid var(--line);border-radius:4px;padding:7px 9px;font-size:12px;font-family:var(--sans);margin-bottom:8px}
  #dictSearch:focus{outline:2px solid var(--shu);outline-offset:-1px}
  #dictIndex{margin-bottom:8px}
  #dictIndex button{background:#fff;border:1px solid var(--line);color:var(--graphite);border-radius:3px;font-size:10.5px;font-family:var(--min);padding:3px 0;text-align:center}
  #dictIndex button:hover{border-color:var(--shu);color:var(--shu)}
  #dictIndex button.off{border-color:transparent;color:#d6d3ca;pointer-events:none;background:transparent}
  #dictIndexSp{display:flex;gap:3px;margin-bottom:4px}
  #dictIndexSp button{flex:1;padding:4px 0;font-size:11px}
  #dictIndexGrid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(5,auto);gap:2px}
  .dsec{font-family:var(--min);font-size:12px;letter-spacing:.3em;color:var(--ink);background:var(--desk);border-left:3px solid var(--shu);padding:4px 8px;margin-top:8px;border-radius:2px}
  #dictList{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
  .dent{border:1px solid var(--line);border-radius:4px;padding:6px 8px;cursor:pointer;background:#fff;text-align:left;font-family:var(--sans)}
  .dent:hover{border-color:var(--shu);background:rgba(199,62,29,.05)}
  .dent .ok{color:var(--shu);font-weight:700;font-size:13px}
  .dent .ng{color:#8f8d86;font-size:11px;text-decoration:line-through;margin-left:6px}
  .dent .nt{display:block;color:#8f8d86;font-size:10px;margin-top:2px}
  #checkBox{border-top:2px solid var(--shu);padding-top:10px}
  #checkBox h3{font-family:var(--min);font-size:12px;letter-spacing:.2em;color:var(--ink);margin-bottom:6px}
  #checkText{width:100%;height:76px;border:1px solid var(--line);border-radius:4px;padding:7px;font-size:12px;font-family:var(--sans);resize:vertical}
  #btnCheck{width:100%;margin-top:6px;background:var(--shu);color:#fff;padding:8px;border-radius:4px;letter-spacing:.1em}
  #checkSummary{font-size:11px;color:var(--graphite);margin-top:8px;line-height:1.5}
  #checkResult{margin-top:6px;display:flex;flex-direction:column;gap:4px}
  .hit{background:#fff;border:1px solid var(--line);border-left:3px solid var(--aka);border-radius:3px;padding:5px 7px;font-size:11px;line-height:1.55}
  .hit b{color:var(--aka)}
  .hit .fix{color:var(--shu);font-weight:700}
  .hit .ctx{color:#8f8d86;display:block;font-size:10px}
  #palette h2{font-family:var(--min);font-size:13px;letter-spacing:.25em;color:var(--ink);border-bottom:2px solid var(--shu);padding-bottom:6px;margin-bottom:10px}
  #palette .hint{font-size:10px;color:#8f8d86;line-height:1.6;margin-bottom:10px}
  #stampList{display:flex;flex-direction:column;gap:6px}
  .stamp{position:relative;display:block;width:100%;text-align:center;font-family:var(--min);font-size:13px;font-weight:600;color:var(--shu);background:#fff;border:1.5px solid var(--shu);border-radius:3px;padding:7px 20px 7px 8px;letter-spacing:.08em;transition:all .12s}
  .stamp:hover{background:var(--shu);color:#fff}
  .stamp.armed{background:var(--shu);color:#fff;box-shadow:0 0 0 2px rgba(199,62,29,.25)}
  .stamp .del{position:absolute;right:3px;top:50%;transform:translateY(-50%);font-size:10px;color:inherit;opacity:.45;background:none;padding:2px 4px}
  .stamp:hover .del{opacity:.75}
  #addStamp{margin-top:8px;width:100%;background:none;border:1.5px dashed var(--line);color:#8f8d86;padding:7px;border-radius:3px}
  #addStamp:hover{border-color:var(--shu);color:var(--shu)}
  #capCtl{margin-top:12px;border-top:1px solid var(--line);padding-top:10px;font-size:11px;color:var(--graphite)}
  #capCtl label{display:block;margin-bottom:4px;font-family:var(--min);letter-spacing:.1em}
  #capCtl input{width:72%;vertical-align:middle;accent-color:var(--shu)}
  #capVal{font-family:var(--mono);margin-left:6px}

  /* 空状態 */
  #empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#8f8d86}
  #empty .mark{font-family:var(--min);font-size:56px;color:var(--shu);border:3px solid var(--shu);border-radius:50%;width:110px;height:110px;display:flex;align-items:center;justify-content:center;letter-spacing:.1em;padding-left:.1em}
  #empty p{font-size:13px;line-height:1.9;text-align:center}
  #empty button{background:var(--shu);color:#fff;padding:10px 22px;font-size:13px;letter-spacing:.1em}

  #toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#e8e6e0;padding:9px 18px;border-radius:5px;font-size:12px;display:none;z-index:99}

  /* ---------- iPad縦画面などの狭い画面 ---------- */
  @media (max-width:1024px){
    #topbar{flex-wrap:wrap;height:auto;min-height:48px;padding:6px 8px;row-gap:4px;column-gap:6px}
    #topbar .sub{display:none}
    #fileName{max-width:90px}
    .tbtn{padding:7px 8px;font-size:11.5px}
    #thumbs{width:72px;padding:8px 5px}
    #palette{width:216px;padding:0 9px 9px}
    #viewerWrap{padding:10px}
  }
  @media (prefers-reduced-motion:no-preference){
    .stamp,.tbtn{transition:all .12s}
  }
</style>
</head>
<body>

<div id="topbar">
  <span class="brand">朱<b>入</b>れ</span><span class="sub">写植指定</span>
  <div class="tbgroup">
    <button class="tbtn" id="btnOpen">PDFを開く</button>
    <span id="fileName"></span>
  </div>
  <div class="tbgroup">
    <button class="tbtn" data-tool="select" title="選択・移動 (V)">選択</button>
    <button class="tbtn" data-tool="box" title="テキスト (T)">テキスト</button>
    <button class="tbtn active" data-tool="pen" title="ペン (⌘P)">ペン</button>
    <button class="tbtn" data-tool="erase" title="消しゴム (E)">消しゴム</button>
    <button class="tbtn" id="btnUndo" title="元に戻す (Ctrl+Z)">戻す</button>
  </div>
  <div class="tbgroup">
    <button class="tbtn" id="zoomOut">−</button>
    <span id="zoomWrap"><input id="zoomInput" type="text" inputmode="numeric" value="100"><span id="zoomPct">%</span></span>
    <button class="tbtn" id="zoomIn">＋</button>
  </div>
  <div class="spacer"></div>
  <div class="tbgroup">
    <button class="tbtn" id="btnSaveJson" title="注釈データをJSONで保存">作業を保存</button>
    <button class="tbtn" id="btnLoadJson" title="保存した注釈データを読み込む">作業を読込</button>
    <button class="tbtn" id="btnExport" style="background:var(--shu);color:#fff">注釈入りPDFを書き出す</button>
  </div>
</div>

<div id="main">
  <div id="thumbs" style="display:none"></div>

  <div id="empty">
    <div class="mark">朱</div>
    <p>原稿PDFを開いて、赤字入れをはじめます。<br>画像化されたPDF(スキャン・ネーム)にも対応しています。</p>
    <button id="btnOpen2">PDFを開く</button>
  </div>

  <div id="viewerWrap" style="display:none">
    <div id="pageBox">
      <canvas id="pageCanvas"></canvas>
      <div id="annoLayer" class="tool-pen">
        <svg id="penSvg"></svg>
      </div>
      <div id="annoTools">
        <button id="atSmaller" title="小さく">A−</button>
        <button id="atBigger" title="大きく">A＋</button>
        <button id="atVert" title="縦書き/横書き切替">縦横</button>
        <button id="atEdit" title="編集">編集</button>
        <button id="atDel" title="削除 (Delete)">削除</button>
      </div>
    </div>
  </div>

  <div id="palette" style="display:none">
    <div id="palTabsWrap">
      <div id="palTabs">
        <button id="tabStamp" class="on">スタンプ</button>
        <button id="tabDict">統一表記</button>
      </div>
    </div>
    <div id="panelStamp">
      <div class="hint">スタンプを選んでからページ上をタップすると、その位置に赤字が入ります。よく使う指示を登録しておけます。</div>
      <div id="stampList"></div>
      <button id="addStamp">＋ スタンプを追加</button>
      <div id="capCtl">
        <label>）カップの幅</label>
        <input id="capRange" type="range" min="0.5" max="3" step="0.1" value="1">
        <span id="capVal">1.0×</span>
      </div>
    </div>
    <div id="panelDict" style="display:none">
      <div class="hint">『付与術師』統一表記表。項目をタップしてからページ上をタップすると、正しい表記(○側)が赤字で入ります。</div>
      <input id="dictSearch" type="search" placeholder="表記を検索(○・×・備考)">
      <div id="dictIndex"></div>
      <div id="dictList"></div>
      <div id="checkBox">
        <h3>テキスト照合</h3>
        <div class="hint">セリフのテキストを貼り付けると、×表記(要修正)を自動で洗い出します。</div>
        <textarea id="checkText" placeholder="ここにセリフのテキストを貼り付け"></textarea>
        <button id="btnCheck">×表記をチェック</button>
        <div id="checkSummary"></div>
        <div id="checkResult"></div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="application/pdf" style="display:none">
<input type="file" id="jsonInput" accept="application/json" style="display:none">
<div id="toast"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ---------------- 状態 ---------------- */
let pdfDoc = null, pageCount = 0, currentPage = 1, zoom = 1.0;
let fitScale = 1;   // 表示エリア幅にページを収める倍率(=100%の基準)
let fileName = "";
let annotations = {};   // page -> [ {id, type:'text'|'pen', x, y, text, size, vertical, points:[[x,y]..], width} ]  座標は0〜1正規化
let stamps = ["2Q上げ","1Q上げ","2Q下げ","1Q下げ","リュウミンU","新ゴB","ハッピネスEB","トル","トルツメ","1ライン","2ライン","3ライン","4ライン","字送りベタ","ルビ：","統一→"];
let tool = "pen";
let armedStamp = null;
let selectedId = null;
let undoStack = [];
let idSeq = 1;
const AKA_SIZE_DEFAULT = 0.016;   // ページ高に対する赤字サイズ

const $ = id => document.getElementById(id);
const layer = $("annoLayer"), penSvg = $("penSvg"), pageCanvas = $("pageCanvas"), pageBox = $("pageBox");

function toast(msg){ const t=$("toast"); t.textContent=msg; t.style.display="block"; clearTimeout(t._tm); t._tm=setTimeout(()=>t.style.display="none",2600); }
function pageAnnos(p=currentPage){ return annotations[p] || (annotations[p]=[]); }

/* ---------------- PDF読み込み ---------------- */
$("btnOpen").onclick = $("btnOpen2").onclick = () => {
  if(typeof pdfjsLib === "undefined"){
    alert("PDF表示ライブラリが読み込めていません。通信環境のある状態でSafariなどのブラウザでこのファイルを開き直してください。");
    return;
  }
  $("fileInput").click();
};
$("fileInput").onchange = async e => {
  const f = e.target.files[0]; if(!f) return;
  try{
    toast("PDFを読み込んでいます…");
    const buf = await f.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({data: buf}).promise;
    pageCount = pdfDoc.numPages;
    fileName = f.name;
    $("fileName").textContent = f.name;
    annotations = {}; undoStack = []; currentPage = 1;
    $("empty").style.display = "none";
    $("viewerWrap").style.display = "flex";
    $("thumbs").style.display = "block";
    $("palette").style.display = "block";
    pageBox.style.display = "block";
    await renderPage(1);
    toast(`${pageCount}ページを読み込みました`);
    buildThumbs();
  }catch(err){
    console.error(err);
    alert("PDFの読み込みに失敗しました:\n" + (err && err.message ? err.message : err) + "\n\niPadの場合は、ファイルの「クイックルック(プレビュー)」ではなく、Safariでこのツールを開いてからPDFを選んでください。");
  }
  e.target.value = "";
};

async function buildThumbs(){
  const wrap = $("thumbs"); wrap.innerHTML = "";
  for(let p=1; p<=pageCount; p++){
    const div = document.createElement("div");
    div.className = "thumb" + (p===currentPage ? " current" : "");
    div.dataset.page = p;
    const c = document.createElement("canvas");
    div.appendChild(c);
    const num = document.createElement("span"); num.className="pnum"; num.textContent=p;
    div.appendChild(num);
    div.onclick = () => renderPage(p);
    wrap.appendChild(div);
    const page = await pdfDoc.getPage(p);
    const vp = page.getViewport({scale: 96/page.getViewport({scale:1}).width});
    c.width = vp.width; c.height = vp.height;
    page.render({canvasContext: c.getContext("2d"), viewport: vp});
  }
}
function refreshThumbMarks(){
  document.querySelectorAll(".thumb").forEach(t=>{
    const p = +t.dataset.page;
    t.classList.toggle("current", p===currentPage);
    let dot = t.querySelector(".hasanno");
    const has = (annotations[p]||[]).length>0;
    if(has && !dot){ dot=document.createElement("span"); dot.className="hasanno"; t.appendChild(dot); }
    if(!has && dot) dot.remove();
  });
}

async function renderPage(p){
  currentPage = p; selectAnno(null);
  const page = await pdfDoc.getPage(p);
  // 表示エリアにページ全体が収まる倍率を100%の基準にする(幅・高さの両方を考慮)
  const base = page.getViewport({scale: 1});
  const availW = Math.max(200, $("viewerWrap").clientWidth - 52);
  const availH = Math.max(200, $("viewerWrap").clientHeight - 52);
  fitScale = Math.min(availW/base.width, availH/base.height);
  const vp = page.getViewport({scale: fitScale * zoom});
  pageCanvas.width = vp.width; pageCanvas.height = vp.height;
  pageBox.style.width = vp.width+"px"; pageBox.style.height = vp.height+"px";
  await page.render({canvasContext: pageCanvas.getContext("2d"), viewport: vp}).promise;
  drawAnnos();
  refreshThumbMarks();
}

/* ---------------- 注釈描画 ---------------- */
const RANGE_TICK = 0.014;   // ｜ー｜の横棒幅(ページ高比)
function drawAnnos(){
  layer.querySelectorAll(".anno").forEach(n=>n.remove());
  penSvg.innerHTML = "";
  const W = pageCanvas.width, H = pageCanvas.height;
  penSvg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  const NS = "http://www.w3.org/2000/svg";
  for(const a of pageAnnos()){
    if(a.type==="pen"){
      const path = document.createElementNS(NS,"path");
      path.setAttribute("d", a.points.map((pt,i)=>(i?"L":"M")+ (pt[0]*W).toFixed(1) +" "+ (pt[1]*H).toFixed(1)).join(" "));
      path.setAttribute("stroke-width", Math.max(1.5, W*0.0022));
      path.dataset.id = a.id;
      penSvg.appendChild(path);
    } else if(a.type==="ellipse"){
      const el = document.createElementNS(NS,"ellipse");
      el.setAttribute("cx",(a.x+a.w/2)*W); el.setAttribute("cy",(a.y+a.h/2)*H);
      el.setAttribute("rx",a.w/2*W); el.setAttribute("ry",a.h/2*H);
      el.setAttribute("stroke-width", Math.max(1.5, W*0.0022));
      el.dataset.id = a.id;
      penSvg.appendChild(el);
    } else if(a.type==="range"){
      const div = document.createElement("div");
      const vert = a.vertical!==false;
      div.className = "anno range " + (vert?"v":"h") + (a.id===selectedId ? " selected" : "");
      const tick = RANGE_TICK*H;
      div.style.left = (a.x*W)+"px";
      div.style.top = (a.y*H)+"px";
      if(vert){ div.style.width = tick+"px"; div.style.height = (a.len*H)+"px"; }
      else{ div.style.width = (a.len*H)+"px"; div.style.height = tick+"px"; }
      div.dataset.id = a.id;
      layer.appendChild(div);
    } else {
      const div = document.createElement("div");
      div.className = "anno" + (a.vertical ? " vertical" : "") + (a.boxed ? " boxed" : "") + (a.id===selectedId ? " selected" : "");
      div.textContent = a.text;
      div.style.left = (a.x*W)+"px";
      div.style.top = (a.y*H)+"px";
      div.style.fontSize = (a.size*H)+"px";
      div.dataset.id = a.id;
      layer.appendChild(div);
    }
  }
  positionAnnoTools();
}

function setTool(t){
  tool = t; armedStamp = null;
  document.querySelectorAll("[data-tool]").forEach(b=>b.classList.toggle("active", b.dataset.tool===t));
  document.querySelectorAll(".stamp").forEach(s=>s.classList.remove("armed"));

document.addEventListener("keydown", e=>{
  if(e.target.isContentEditable || /INPUT|TEXTAREA/.test(e.target.tagName)) return;
  if(e.metaKey || e.ctrlKey){
    const k = e.key.toLowerCase();
    if(k==="p"){ e.preventDefault(); setTool("pen"); return; }
    if(k==="t"){ e.preventDefault(); setTool("box"); return; }
    if(k==="z"){ e.preventDefault(); undo(); return; }
    return;
  }
  if(e.key==="v"||e.key==="V") setTool("select");
  if(e.key==="t"||e.key==="T") setTool("box");
  if(e.key==="p"||e.key==="P") setTool("pen");
  if(e.key==="e"||e.key==="E") setTool("erase");
  if((e.key==="Delete"||e.key==="Backspace") && selectedId){ deleteAnno(selectedId); e.preventDefault(); }
});

$("btnCheck").onclick = ()=>{

  const out = $("checkResult"); out.innerHTML = "";
  if(!text.trim()){ $("checkSummary").textContent = "テキストを貼り付けてください"; return; }
  let hits = 0;
  for(const d of DICT){
    if(!d.ng) continue;
    for(let ng of d.ng.split(/[・、\/\s]+/)){
      ng = ng.trim();
      if(!ng || ng.includes("○")) continue;
      let i = 0;
      while((i = text.indexOf(ng, i)) !== -1 && hits < 400){
        hits++;
        const div = document.createElement("div"); div.className = "hit";
        div.innerHTML = `<b>×${esc(ng)}</b> → <span class="fix">○${esc(d.ok)}</span>`
          + (d.note ? ` <span style="color:#8f8d86">※${esc(d.note)}</span>` : "")
          + `<span class="ctx">…${esc(text.slice(Math.max(0,i-8),i))}【${esc(ng)}】${esc(text.slice(i+ng.length,i+ng.length+8))}…</span>`;
        out.appendChild(div);
        i += ng.length;
      }
    }
  }
  $("checkSummary").textContent = hits
    ? `${hits}件の×表記候補が見つかりました。「事」「達」など単漢字の項目は熟語(仕事・発達など)も拾うため、前後の文脈で目視確認してください。`

function normPos(e){
  const r = layer.getBoundingClientRect();
  return [ (e.clientX-r.left)/r.width, (e.clientY-r.top)/r.height ];
}
function addAnno(a){ pageAnnos().push(a); undoStack.push({op:"add", page:currentPage, id:a.id}); drawAnnos(); refreshThumbMarks(); }
function findAnno(id, p=currentPage){ return (annotations[p]||[]).find(a=>a.id===id); }
function deleteAnno(id){
  const arr = pageAnnos(); const i = arr.findIndex(a=>a.id===id);
  if(i>=0){ undoStack.push({op:"del", page:currentPage, anno:arr[i], index:i}); arr.splice(i,1); selectAnno(null); drawAnnos(); refreshThumbMarks(); }
}
function undo(){
  const u = undoStack.pop(); if(!u) return;
  const arr = annotations[u.page] || (annotations[u.page]=[]);
  if(u.op==="add"){ const i=arr.findIndex(a=>a.id===u.id); if(i>=0) arr.splice(i,1); }
  if(u.op==="del"){ arr.splice(Math.min(u.index,arr.length),0,u.anno); }
  if(u.op==="move"){ const a=arr.find(x=>x.id===u.id); if(a){ a.x=u.x; a.y=u.y; } }
  if(u.page===currentPage){ drawAnnos(); } refreshThumbMarks();
}

let drag = null, penPts = null, penPath = null, isLeaderLine = false;
let circ = null, circEl = null, fromRubyFlow = false, lastStampId = null;
let rangeStart = null, rangePrev = null, erasing = false;

/* 2本指ジェスチャ(ピンチズーム+パン) */
const touches = new Map();
let pinch = null;
function cancelStroke(){
  if(penPts){ if(penPath) penPath.remove(); penPts=null; penPath=null; isLeaderLine=false; }
  if(circ){ if(circEl) circEl.remove(); circ=null; circEl=null; }
  if(rangeStart){ if(rangePrev) rangePrev.remove(); rangeStart=null; rangePrev=null; }
  drag = null; erasing = false;
}
function startPinch(){
  cancelStroke();
  const pts = [...touches.values()];
  pinch = {
    d0: Math.max(1, Math.hypot(pts[0][0]-pts[1][0], pts[0][1]-pts[1][1])),
    mid: [(pts[0][0]+pts[1][0])/2, (pts[0][1]+pts[1][1])/2],
    ratio: 1
  };
  pageBox.style.transformOrigin = "center center";
}
function movePinch(){
  if(!pinch) return;
  const pts = [...touches.values()];
  if(pts.length < 2) return;
  const d = Math.max(1, Math.hypot(pts[0][0]-pts[1][0], pts[0][1]-pts[1][1]));
  const mid = [(pts[0][0]+pts[1][0])/2, (pts[0][1]+pts[1][1])/2];
  pinch.ratio = Math.max(0.3, Math.min(4, d/pinch.d0));
  pageBox.style.transform = `scale(${pinch.ratio})`;
  const wrap = $("viewerWrap");
  wrap.scrollLeft -= (mid[0] - pinch.mid[0]);
  wrap.scrollTop  -= (mid[1] - pinch.mid[1]);
  pinch.mid = mid;
}
function endPinch(){
  if(!pinch) return;
  const r = pinch.ratio; pinch = null;
  pageBox.style.transform = "";
  if(Math.abs(r-1) > 0.03) applyZoom(zoom*100*r);
}

/* 消しゴム:座標に触れている注釈を1つ削除 */
function segDist(x, y, p, q, W, H){
  const ax=p[0]*W, ay=p[1]*H, bx=q[0]*W, by=q[1]*H, px=x*W, py=y*H;
  const dx=bx-ax, dy=by-ay; const L2=dx*dx+dy*dy;
  let t = L2 ? ((px-ax)*dx+(py-ay)*dy)/L2 : 0; t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+t*dx), py-(ay+t*dy));
}
function eraseAt(x, y){
  const W = pageCanvas.width, H = pageCanvas.height;
  const th = 9;
  const arr = pageAnnos();
  for(let i=arr.length-1; i>=0; i--){
    const a = arr[i];
    let hit = false;
    if(a.type==="pen"){
      for(let j=0; j<a.points.length-1 && !hit; j++){
        if(segDist(x, y, a.points[j], a.points[j+1], W, H) < th) hit = true;
      }
    } else if(a.type==="ellipse"){
      const cx=a.x+a.w/2, cy=a.y+a.h/2;
      const rx=Math.max(a.w/2,1e-6), ry=Math.max(a.h/2,1e-6);
      const v = Math.pow((x-cx)/rx,2) + Math.pow((y-cy)/ry,2);
      if(v <= 1.2) hit = true;
    } else if(a.type==="range"){
      const tick = RANGE_TICK*H, left = a.x*W, top = a.y*H;
      const w = a.vertical!==false ? tick : a.len*H;
      const h = a.vertical!==false ? a.len*H : tick;
      if(x*W >= left-th && x*W <= left+w+th && y*H >= top-th && y*H <= top+h+th) hit = true;
    } else {
      const el = layer.querySelector(`.anno[data-id="${a.id}"]`);
      if(el){
        const px=x*W, py=y*H;
        if(px >= el.offsetLeft-4 && px <= el.offsetLeft+el.offsetWidth+4 &&
           py >= el.offsetTop-4 && py <= el.offsetTop+el.offsetHeight+4) hit = true;
      }
    }
    if(hit){ deleteAnno(a.id); return true; }
  }
  return false;
}

/* 「)」カップを線の先に付けるスタンプ */
const CAP_STAMPS = ["2Q上げ","1Q上げ","2Q下げ","1Q下げ","リュウミンU","新ゴB","ハッピネスEB"];
let capScale = 1;   // カップの幅倍率(スタンプパレットのスライダーで変更)

/* 手ぶれ補正:ほぼ直線なら直線にスナップ(縦・横に近ければ完全な縦線・横線に)、そうでなければ平滑化 */
function smoothLine(pts){
  const W = pageCanvas.width, H = pageCanvas.height;
  let P = pts.map(p=>[p[0]*W, p[1]*H]);
  const A = P[0], B = P[P.length-1];
  const L = Math.hypot(B[0]-A[0], B[1]-A[1]);
  if(L > 1){
    let maxd = 0;
    for(const q of P){
      const d = Math.abs((B[0]-A[0])*(A[1]-q[1]) - (A[0]-q[0])*(B[1]-A[1])) / L;
      if(d > maxd) maxd = d;
    }
    if(maxd < Math.max(6, H*0.009)){
      const a = pts[0].slice(), b = pts[pts.length-1].slice();
      const dxp = Math.abs((b[0]-a[0])*W), dyp = Math.abs((b[1]-a[1])*H);
      if(dyp > 0 && dxp/dyp < 0.2){ const cx=(a[0]+b[0])/2; a[0]=cx; b[0]=cx; }        // 縦線スナップ
      else if(dxp > 0 && dyp/dxp < 0.2){ const cy=(a[1]+b[1])/2; a[1]=cy; b[1]=cy; }   // 横線スナップ
      return [a, b];
    }
  }
  for(let k=0; k<3; k++){
    const Q = P.map(p=>p.slice());
    for(let i=1; i<P.length-1; i++){
      Q[i][0] = (P[i-1][0] + 2*P[i][0] + P[i+1][0]) / 4;
      Q[i][1] = (P[i-1][1] + 2*P[i][1] + P[i+1][1]) / 4;
    }
    P = Q;
  }
  return P.map(p=>[p[0]/W, p[1]/H]);
}

/* 線の終端に「)」カップを描く */
function addCap(pts){
  const W = pageCanvas.width, H = pageCanvas.height;
  const E = [pts[pts.length-1][0]*W, pts[pts.length-1][1]*H];
  const S = [pts[Math.max(0, pts.length-4)][0]*W, pts[Math.max(0, pts.length-4)][1]*H];
  let dx = E[0]-S[0], dy = E[1]-S[1];
  const L = Math.hypot(dx, dy) || 1; dx /= L; dy /= L;
  const nx = -dy, ny = dx;
  const r = H*0.016*capScale;
  // カップの弧の頂点が線の終端にちょうど重なる位置(頂点は中心から0.8r後方にできる)
  const Ex = E[0] + dx*r*0.75, Ey = E[1] + dy*r*0.75;
  const P0 = [Ex+nx*r, Ey+ny*r], P2 = [Ex-nx*r, Ey-ny*r], C = [Ex-dx*r*1.6, Ey-dy*r*1.6];
  const cap = [];
  for(let i=0; i<=10; i++){
    const t = i/10, u = 1-t;
    cap.push([ (u*u*P0[0] + 2*u*t*C[0] + t*t*P2[0])/W, (u*u*P0[1] + 2*u*t*C[1] + t*t*P2[1])/H ]);
  }
  addAnno({ id:"a"+(idSeq++), type:"pen", points:cap });
}

layer.addEventListener("pointerdown", e=>{
  if(e.target.isContentEditable) return;
  if(e.pointerType==="touch"){
    touches.set(e.pointerId, [e.clientX, e.clientY]);
    if(touches.size === 2){ startPinch(); e.preventDefault(); return; }
    if(pinch){ e.preventDefault(); return; }
  }
  const [x,y] = normPos(e);

  if(tool==="text" || tool==="stamp" || tool==="box"){
    const isStamp = tool==="stamp";
    const a = { id:"a"+(idSeq++), type:"text", x, y, size:AKA_SIZE_DEFAULT,
                vertical: tool!=="text", boxed: tool==="box",
                text: isStamp ? armedStamp : "" };
    addAnno(a);
    selectAnno(a.id);
    if(!isStamp){ startEdit(a.id, true); }
    else {
      lastStampId = a.id;
      tool = "line"; layer.className = "tool-line";
      toast("そのままセリフまでドラッグで引き出し線(曲線可・タップでスキップ)");
    }
    e.preventDefault(); return;
  }

  if(tool==="pen" || tool==="line"){
    isLeaderLine = (tool==="line");
    penPts = [[x,y]];
    penPath = document.createElementNS("http://www.w3.org/2000/svg","path");
    penPath.setAttribute("stroke-width", Math.max(1.5, pageCanvas.width*0.0022));
    penSvg.appendChild(penPath);
    layer.setPointerCapture(e.pointerId);
    e.preventDefault(); return;
  }

  if(tool==="circle"){
    circ = [x,y,x,y];
    circEl = document.createElementNS("http://www.w3.org/2000/svg","ellipse");
    circEl.setAttribute("stroke-width", Math.max(1.5, pageCanvas.width*0.0022));
    penSvg.appendChild(circEl);
    layer.setPointerCapture(e.pointerId);
    e.preventDefault(); return;
  }

  if(tool==="range"){
    rangeStart = [x,y];
    rangePrev = document.createElementNS("http://www.w3.org/2000/svg","path");
    rangePrev.setAttribute("stroke-width", Math.max(1.5, pageCanvas.width*0.0022));
    penSvg.appendChild(rangePrev);
    layer.setPointerCapture(e.pointerId);
    e.preventDefault(); return;
  }

  if(tool==="erase"){
    erasing = true;
    eraseAt(x, y);
    layer.setPointerCapture(e.pointerId);
    e.preventDefault(); return;
  }

  if(tool==="pen"){
    penPts = [[x,y]];
    penPath = document.createElementNS("http://www.w3.org/2000/svg","path");
    penPath.setAttribute("stroke-width", Math.max(1.5, pageCanvas.width*0.0022));
    penSvg.appendChild(penPath);
    layer.setPointerCapture(e.pointerId);
    e.preventDefault(); return;
  }

  // select
  const t = e.target.closest(".anno");
  if(t){
    selectAnno(t.dataset.id);
    const a = findAnno(t.dataset.id);
    drag = { id:a.id, sx:x, sy:y, ox:a.x, oy:a.y, moved:false };
    layer.setPointerCapture(e.pointerId);
  } else selectAnno(null);
});

layer.addEventListener("pointermove", e=>{
  if(e.pointerType==="touch" && touches.has(e.pointerId)) touches.set(e.pointerId, [e.clientX, e.clientY]);
  if(pinch){ movePinch(); return; }
  const [x,y] = normPos(e);
  const W = pageCanvas.width, H = pageCanvas.height;
  if(circ && circEl){
    circ[2]=x; circ[3]=y;
    circEl.setAttribute("cx",(circ[0]+circ[2])/2*W); circEl.setAttribute("cy",(circ[1]+circ[3])/2*H);
    circEl.setAttribute("rx",Math.abs(circ[2]-circ[0])/2*W); circEl.setAttribute("ry",Math.abs(circ[3]-circ[1])/2*H);
    return;
  }
  if(rangeStart && rangePrev){
    const cx=rangeStart[0]*W, y0=rangeStart[1]*H, y1=y*H, t=RANGE_TICK*H/2;
    rangePrev.setAttribute("d",`M${cx-t} ${y0} L${cx+t} ${y0} M${cx} ${y0} L${cx} ${y1} M${cx-t} ${y1} L${cx+t} ${y1}`);
    return;
  }
  if(erasing){ eraseAt(x, y); return; }
  if(penPts){
    penPts.push([x,y]);
    const W=pageCanvas.width, H=pageCanvas.height;
    penPath.setAttribute("d", penPts.map((pt,i)=>(i?"L":"M")+(pt[0]*W).toFixed(1)+" "+(pt[1]*H).toFixed(1)).join(" "));
    return;
  }
  if(drag){
    const a = findAnno(drag.id); if(!a) return;
    a.x = drag.ox + (x-drag.sx); a.y = drag.oy + (y-drag.sy); drag.moved = true;
    const el = layer.querySelector(`.anno[data-id="${a.id}"]`);
    el.style.left = (a.x*pageCanvas.width)+"px"; el.style.top = (a.y*pageCanvas.height)+"px";
    positionAnnoTools();
  }
});

layer.addEventListener("pointerup", e=>{
  if(e.pointerType==="touch") touches.delete(e.pointerId);
  if(pinch){ if(touches.size < 2) endPinch(); return; }
  if(erasing){ erasing = false; return; }
  if(penPts){
    const wasLeader = isLeaderLine; isLeaderLine = false;
    if(penPts.length>2){
      const pts = smoothLine(penPts);
      addAnno({ id:"a"+(idSeq++), type:"pen", points:pts });
      if(wasLeader && armedStamp && CAP_STAMPS.includes(armedStamp)) addCap(pts);
    }
    else penPath.remove();
    penPts=null; penPath=null;
    if(wasLeader){
      if(armedStamp && armedStamp.includes("ルビ")){
        fromRubyFlow = true;
        tool = "circle"; layer.className = "tool-circle";
        toast("ルビをかける範囲をドラッグでマル囲み(タップでスキップ)");
      } else {
        setTool("pen");
      }
    }
    drawAnnos(); return;
  }
  if(circ){
    const w = Math.abs(circ[2]-circ[0]), h = Math.abs(circ[3]-circ[1]);
    if(w > 0.005 || h > 0.005){
      addAnno({ id:"a"+(idSeq++), type:"ellipse",
                x:Math.min(circ[0],circ[2]), y:Math.min(circ[1],circ[3]), w, h });
    } else if(circEl){ circEl.remove(); }
    circ=null; circEl=null;
    if(fromRubyFlow){
      fromRubyFlow = false;
      const s0 = findAnno(lastStampId);
      setTool("pen");
      const b = { id:"a"+(idSeq++), type:"text",
                  x: s0 ? s0.x : 0.5,
                  y: s0 ? s0.y + Math.max(1, String(s0.text).length) * s0.size * 1.1 + 0.012 : 0.5,
                  size: AKA_SIZE_DEFAULT, vertical:true, boxed:true, text:"" };
      addAnno(b); selectAnno(b.id);
      startEdit(b.id, true);
      toast("ルビの読みを入力してください");
      return;
    }
    drawAnnos(); return;
  }
  if(rangeStart){
    const [x,y] = normPos(e);
    const W = pageCanvas.width, H = pageCanvas.height;
    let len = Math.abs(y - rangeStart[1]);
    if(len < 0.01) len = 0.08;
    addAnno({ id:"a"+(idSeq++), type:"range", vertical:true,
              x: rangeStart[0] - (RANGE_TICK*H)/(2*W),
              y: Math.min(rangeStart[1], y),
              len });
    rangeStart=null; if(rangePrev){ rangePrev.remove(); rangePrev=null; }
    drawAnnos(); return;
  }
  if(drag){
    if(drag.moved) undoStack.push({op:"move", page:currentPage, id:drag.id, x:drag.ox, y:drag.oy});
    drag=null;
  }
});

layer.addEventListener("pointercancel", e=>{
  if(e.pointerType==="touch") touches.delete(e.pointerId);
  if(pinch && touches.size < 2) endPinch();
  cancelStroke();
});

layer.addEventListener("dblclick", e=>{
  const t = e.target.closest(".anno");
  if(t && findAnno(t.dataset.id)?.type==="text") startEdit(t.dataset.id);
});

function startEdit(id, isNew=false){
  drawAnnos();
  const el = layer.querySelector(`.anno[data-id="${id}"]`);
  const a = findAnno(id); if(!el||!a) return;
  el.contentEditable = "true"; el.focus();
  if(!isNew){ const r=document.createRange(); r.selectNodeContents(el); const s=getSelection(); s.removeAllRanges(); s.addRange(r); }
  const finish = ()=>{
    el.contentEditable = "false";
    a.text = el.innerText.replace(/\n$/,"");
    if(!a.text.trim()){ const arr=pageAnnos(); const i=arr.findIndex(x=>x.id===id); if(i>=0) arr.splice(i,1); }
    drawAnnos(); refreshThumbMarks();
  };
  el.addEventListener("blur", finish, {once:true});
  el.addEventListener("keydown", ev=>{ if(ev.key==="Escape"){ ev.preventDefault(); el.blur(); } });
}

/* 選択中ツール */
$("atDel").onclick = ()=> selectedId && deleteAnno(selectedId);
$("atEdit").onclick = ()=>{ const a=findAnno(selectedId); if(a && a.type==="text") startEdit(a.id); };
$("atBigger").onclick = ()=>{ const a=findAnno(selectedId); if(!a) return;
  if(a.type==="range") a.len*=1.15; else if(a.type==="text") a.size*=1.15;
  drawAnnos(); selectAnno(a.id); };
$("atSmaller").onclick = ()=>{ const a=findAnno(selectedId); if(!a) return;
  if(a.type==="range") a.len/=1.15; else if(a.type==="text") a.size/=1.15;
  drawAnnos(); selectAnno(a.id); };
$("atVert").onclick = ()=>{ const a=findAnno(selectedId); if(!a) return;
  if(a.type==="text" || a.type==="range"){ a.vertical = (a.vertical===false); drawAnnos(); selectAnno(a.id); } };
$("btnUndo").onclick = ()=> undo();

/* ---------------- ズーム ---------------- */
function applyZoom(pct){
  pct = Math.round(Math.max(25, Math.min(400, pct)));
  zoom = pct/100;
  $("zoomInput").value = pct;
  renderPage(currentPage);
}
/* 画面回転やウィンドウサイズ変更でページを再フィット */
let resizeTm = null;
window.addEventListener("resize", ()=>{
  if(!pdfDoc) return;
  clearTimeout(resizeTm);
  resizeTm = setTimeout(()=> renderPage(currentPage), 250);
});
$("zoomIn").onclick  = ()=> applyZoom(zoom*100 + 25);
$("zoomOut").onclick = ()=> applyZoom(zoom*100 - 25);
$("zoomInput").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); e.target.blur(); } });
$("zoomInput").addEventListener("change", e=>{
  const v = parseInt(String(e.target.value).replace(/[^0-9]/g,""), 10);
  if(!isNaN(v)) applyZoom(v); else $("zoomInput").value = Math.round(zoom*100);
});

/* ---------------- 作業データ保存/読込 ---------------- */
$("btnSaveJson").onclick = ()=>{
  const data = { app:"shu-ire", version:1, fileName, stamps, annotations, capScale };
  const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (fileName.replace(/\.pdf$/i,"")||"akaji") + "_朱入れ.json";
  a.click();
  toast("注釈データを保存しました(PDFと一緒に保管してください)");
};
$("btnLoadJson").onclick = ()=> $("jsonInput").click();
$("jsonInput").onchange = async e=>{
  const f = e.target.files[0]; if(!f) return;
  try{
    const data = JSON.parse(await f.text());
    if(data.app!=="shu-ire") throw 0;
    annotations = data.annotations||{}; stamps = data.stamps||stamps;
    if(data.capScale){ capScale = data.capScale; $("capRange").value = capScale; $("capVal").textContent = capScale.toFixed(1)+"×"; }
    let mx=0; Object.values(annotations).flat().forEach(a=>{ const n=+String(a.id).slice(1); if(n>mx)mx=n; }); idSeq=mx+1;
    renderStamps();
    if(pdfDoc){ drawAnnos(); refreshThumbMarks(); }
    toast("注釈データを読み込みました" + (pdfDoc?"":"(PDFを開くと表示されます)"));
  }catch{ toast("読み込めませんでした。このツールで保存したJSONを指定してください"); }
  e.target.value="";
};

/* ---------------- PDF書き出し ---------------- */
$("btnExport").onclick = async ()=>{
  if(!pdfDoc){ toast("先にPDFを開いてください"); return; }
  toast("書き出し中…(ページ数によって少し時間がかかります)");
  try{
    const out = await PDFLib.PDFDocument.create();
    for(let p=1; p<=pageCount; p++){
      const page = await pdfDoc.getPage(p);
      // iPad(iOS)のキャンバス面積上限(約1670万px)を超えないよう倍率を自動調整
      const base = page.getViewport({scale: 1});
      const sc = Math.min(2, Math.sqrt(16000000 / (base.width * base.height)));
      const vp = page.getViewport({scale: sc});
      const c = document.createElement("canvas");
      c.width = vp.width; c.height = vp.height;
      const ctx = c.getContext("2d");
      ctx.fillStyle="#fff"; ctx.fillRect(0,0,c.width,c.height);
      await page.render({canvasContext: ctx, viewport: vp}).promise;

      ctx.strokeStyle = ctx.fillStyle = "#d4380d";
      for(const a of (annotations[p]||[])){
        if(a.type==="pen"){
          ctx.lineWidth = Math.max(2, vp.width*0.0022);
          ctx.lineCap = ctx.lineJoin = "round";
          ctx.beginPath();
          a.points.forEach((pt,i)=> i ? ctx.lineTo(pt[0]*vp.width, pt[1]*vp.height) : ctx.moveTo(pt[0]*vp.width, pt[1]*vp.height));
          ctx.stroke();
        } else if(a.type==="ellipse"){
          ctx.lineWidth = Math.max(2, vp.width*0.0022);
          ctx.beginPath();
          ctx.ellipse((a.x+a.w/2)*vp.width, (a.y+a.h/2)*vp.height, a.w/2*vp.width, a.h/2*vp.height, 0, 0, Math.PI*2);
          ctx.stroke();
        } else if(a.type==="range"){
          ctx.lineWidth = Math.max(2, vp.width*0.0022);
          const tick = 0.014*vp.height;
          ctx.beginPath();
          if(a.vertical!==false){
            const cx = a.x*vp.width + tick/2, y0 = a.y*vp.height, y1 = y0 + a.len*vp.height;
            ctx.moveTo(cx-tick/2, y0); ctx.lineTo(cx+tick/2, y0);
            ctx.moveTo(cx, y0); ctx.lineTo(cx, y1);
            ctx.moveTo(cx-tick/2, y1); ctx.lineTo(cx+tick/2, y1);
          } else {
            const cy = a.y*vp.height + tick/2, x0 = a.x*vp.width, x1 = x0 + a.len*vp.height;
            ctx.moveTo(x0, cy-tick/2); ctx.lineTo(x0, cy+tick/2);
            ctx.moveTo(x0, cy); ctx.lineTo(x1, cy);
            ctx.moveTo(x1, cy-tick/2); ctx.lineTo(x1, cy+tick/2);
          }
          ctx.stroke();
        } else {
          const fs = a.size*vp.height;
          ctx.font = `700 ${fs}px "Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Meiryo",sans-serif`;
          ctx.textBaseline = "top";
          const px = a.x*vp.width + fs*0.15, py = a.y*vp.height + fs*0.1;
          if(a.vertical){
            let yy = py;
            for(const ch of a.text.replace(/\n/g,"")){ ctx.fillText(ch, px, yy); yy += fs*1.05; }
          } else {
            a.text.split("\n").forEach((ln,i)=> ctx.fillText(ln, px, py + fs*1.25*i));
          }
          if(a.boxed){
            ctx.lineWidth = Math.max(2, vp.width*0.0022);
            if(a.vertical){
              const n = a.text.replace(/\n/g,"").length || 1;
              ctx.strokeRect(px - fs*0.3, py - fs*0.2, fs*1.5, n*fs*1.05 + fs*0.35);
            } else {
              const lines = a.text.split("\n");
              let mw = 0; for(const ln of lines) mw = Math.max(mw, ctx.measureText(ln).width);
              ctx.strokeRect(px - fs*0.25, py - fs*0.2, mw + fs*0.5, lines.length*fs*1.25 + fs*0.3);
            }
          }
        }
      }
      const img = await out.embedJpg(c.toDataURL("image/jpeg", 0.88));
      const pg = out.addPage([vp.width, vp.height]);
      pg.drawImage(img, {x:0, y:0, width:vp.width, height:vp.height});
    }
    const bytes = await out.save();
    const blob = new Blob([bytes], {type:"application/pdf"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (fileName.replace(/\.pdf$/i,"")||"akaji") + "_赤字入り.pdf";
    a.click();
    toast("注釈入りPDFを書き出しました");
  }catch(err){ console.error(err); toast("書き出しに失敗しました: "+err.message); }
};
